name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel older runs of the same PR/branch when a new push lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    # SwiftLint with the project's `.swiftlint.yml` config. Today's config is
    # tuned so develop is at zero errors and ~8 force_unwrapping warnings —
    # the warnings annotate but don't block. Errors block. Configured in
    # `.swiftlint.yml`; rule rationale lives there.
    name: swiftlint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Show SwiftLint version
        run: swiftlint version

      - name: Run SwiftLint
        # No `--strict` — warnings are intentional under our config (e.g.
        # force_unwrapping is warning-level per PLAN C.13). Errors block.
        run: swiftlint --reporter github-actions-logging

  swift-test:
    # Pure-Swift logic tests via SPM (Package.swift). Covers GIEngineCore,
    # CLEngineCore, TranscriptParserCore. Fast and Linux-portable in
    # principle; we run on macOS so we share the toolchain with the iOS job.
    name: swift test (SPM)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run SPM tests
        run: swift test --parallel

  ios-build-and-test:
    # iOS Simulator build + the matcher regression test bundle. The iOS
    # XCTest target (GlycoTrackTests) hosts the suite that exercises
    # NutritionalRepository against a real in-memory Core Data store seeded
    # from the bundled JSONs — see Tests/MatchingTests/.
    name: xcodebuild iOS Simulator
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        # Pin to whatever Xcode the runner ships with by default. The
        # project's deployment target is iOS 16, so any Xcode 15+ works.
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        # The pbxproj is committed, but regenerating from project.yml catches
        # drift between the two.
        run: xcodegen generate

      - name: Pick simulator destination
        # Pull the first available iPhone simulator off the runner so we
        # don't hardcode a model name that may rotate out of the macos-15
        # image (e.g. "iPhone 16" became "iPhone 17" on this runner image).
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available 2>/dev/null \
            | grep -Eo 'iPhone [0-9]+( Pro)?( Max)?' \
            | head -n1)
          if [ -z "$NAME" ]; then
            echo "No iPhone simulator available on this runner" >&2
            xcrun simctl list devices available
            exit 1
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $NAME"

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project GlycoTrack.xcodeproj \
            -scheme GlycoTrack \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -skipMacroValidation \
            build

      - name: Run iOS tests
        # Boots the simulator and runs the GlycoTrackTests XCTest bundle —
        # currently the matcher regression suite (12 tests).
        run: |
          xcodebuild \
            -project GlycoTrack.xcodeproj \
            -scheme GlycoTrack \
            -configuration Debug \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -skipMacroValidation \
            test
