name: GlycoTrack
options:
  bundleIdPrefix: com.glycotrack
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

configFiles:
  Debug: GlycoTrack/Config/GlycoTrack.xcconfig
  Release: GlycoTrack/Config/GlycoTrack.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic

targets:
  GlycoTrack:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GlycoTrack
    resources:
      - GlycoTrack/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glycotrack.app
        INFOPLIST_FILE: GlycoTrack/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_BITCODE: NO
        CODE_SIGN_ENTITLEMENTS: GlycoTrack/GlycoTrack.entitlements
        # AppIcon comes from GlycoTrack/Resources/Assets.xcassets/AppIcon.appiconset.
        # Xcode's asset catalog compiler synthesizes all required device sizes from
        # the single 1024x1024 universal source we ship there.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: GlycoTrack/GlycoTrack.entitlements
      properties: {}
    dependencies:
      - target: GlycoTrackWidget

  GlycoTrackWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GlycoTrackWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glycotrack.app.widget
        INFOPLIST_FILE: GlycoTrackWidget/Info.plist
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: GlycoTrackWidget/GlycoTrackWidget.entitlements
    entitlements:
      path: GlycoTrackWidget/GlycoTrackWidget.entitlements
      properties: {}

  GlycoTrackTests:
    # iOS XCTest bundle. Hosts only tests that need the iOS app target
    # (NutritionalRepository, PersistenceController — anything that touches
    # Core Data or @MainActor types). Pure-Swift engine tests live under
    # Tests/GIEngineCoreTests / CLEngineCoreTests / TranscriptParserCoreTests
    # and run via `swift test` against the SPM Package.swift targets — they
    # use `@testable import GIEngineCore` etc. which aren't visible to the
    # iOS app build.
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - Tests/MatchingTests
    resources:
      # Both JSONs ship in the test bundle so PersistenceController's seed
      # path (Bundle.main.url(forResource:)) finds them when running tests.
      # The app target carries its own copies; this is intentional duplication.
      - GlycoTrack/Resources/gi_database.json
      - GlycoTrack/Resources/usda_nutrition.json
    dependencies:
      - target: GlycoTrack
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.glycotrack.tests
        GENERATE_INFOPLIST_FILE: YES
